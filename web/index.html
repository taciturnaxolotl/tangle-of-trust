<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The tangled web of trust</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="https://assets.tangled.network/tangled_logotype_white_on_trans.svg" alt="tangled" height="28">
            <span class="logo-badge">web of trust</span>
        </a>
        <nav>
            <div id="search-wrap">
                <input id="search-input" type="text" placeholder="Search handle..." autocomplete="off" spellcheck="false">
                <div id="search-dropdown"></div>
            </div>
            <span id="header-stats"></span>
        </nav>
    </header>

    <div id="main-area">
        <div id="graph-container"></div>
        <div id="sidebar"></div>
    </div>
    <div id="loading">Loading graph data...</div>
    <div id="tooltip"></div>

    <div id="controls">
        <div id="controls-row">
            <button class="filter-btn active" data-kind="vouch/vouch">
                <span class="filter-dot" style="background:var(--vouch)"></span>vouch
            </button>
            <button class="filter-btn active" data-kind="vouch/denounce">
                <span class="filter-dot" style="background:var(--denounce)"></span>denounce
            </button>
            <button class="filter-btn active" data-kind="vouch/mixed">
                <span class="filter-dot" style="background:#df8e1d"></span>mixed
            </button>
            <button class="filter-btn" data-kind="follow">
                <span class="filter-dot" style="background:var(--follow)"></span>follow
            </button>
            <div class="spacer"></div>
            <div id="stats-row">
                <span id="stat-nodes">0</span> nodes &middot;
                <span id="stat-vouches">0</span> vouches &middot;
                <span id="stat-denounces">0</span> denounces &middot;
                <span id="stat-mixed">0</span> mixed &middot;
                <span id="stat-follows">0</span> follows
            </div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
